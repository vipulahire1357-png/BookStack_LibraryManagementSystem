<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BookStack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f0f4f8; margin:0; font-family:inherit; }
    .login-box { background:#fff; border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.10); padding:2.5rem 2rem; width:100%; max-width:380px; }
    .login-brand { text-align:center; margin-bottom:1.8rem; }
    .login-brand .icon { font-size:2.5rem; }
    .login-brand h1 { font-size:1.5rem; font-weight:700; color:#1e293b; margin:.4rem 0 .2rem; }
    .login-brand p  { color:#64748b; font-size:.85rem; margin:0; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:.82rem; font-weight:600; color:#374151; margin-bottom:.35rem; }
    .form-group input { width:100%; box-sizing:border-box; padding:.6rem .8rem; border:1.5px solid #d1d5db; border-radius:7px; font-size:.95rem; outline:none; transition:border-color .2s; }
    .form-group input:focus { border-color:#6366f1; }
    .btn-login { width:100%; padding:.7rem; background:#6366f1; color:#fff; border:none; border-radius:7px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:.5rem; transition:background .2s; }
    .btn-login:hover { background:#4f46e5; }
    .flash-container { margin-bottom:1rem; }
    .flash { padding:.6rem .9rem; border-radius:7px; font-size:.88rem; }
    .flash-error   { background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; }
    .flash-success { background:#f0fdf4; color:#16a34a; border:1px solid #86efac; }

  </style>
</head>
<body>
<div class="login-box">
  <div class="login-brand">
    <div class="icon">📚</div>
    <h1>BookStack</h1>
    <p>Library Management System</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-login">Log In</button>
  </form>


</div>
</body>
</html>
